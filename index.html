<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランディングページ一覧</title>
  <style>
    :root {
      --gold: #B8822A;
      --bg: #FAF8F3;
      --bg2: #F2EBE0;
      --text: #2A2620;
      --text-light: #6B5E4E;
      --border: #DDD0B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', Georgia, serif;
      background: #EDE6D8;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      max-width: 560px;
      width: 100%;
      background: var(--bg);
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(120,100,60,0.12);
      padding: 40px 28px;
    }
    h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      margin-bottom: 28px;
    }
    .lp-card {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 14px;
      transition: all 0.2s;
    }
    .lp-card:hover {
      box-shadow: 0 4px 18px rgba(184,130,42,0.18);
      transform: translateY(-2px);
      border-color: var(--gold);
    }
    .lp-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lp-title .arrow { color: var(--gold); font-size: 20px; }
    .lp-desc {
      font-size: 13px;
      color: var(--text-light);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    }
    .foot {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ランディングページ一覧</h1>
    <p class="sub">AI経営 / ランディングページ集</p>

    <a class="lp-card" href="shindan/">
      <div class="lp-title">AI経営ボトルネック無料診断<span class="arrow">›</span></div>
      <div class="lp-desc">人を増やさず利益を伸ばしたい経営者向け・30分無料診断LP</div>
    </a>

    <!-- 今後ここにLPを追加していく -->

    <p class="foot">© AI経営</p>
  </div>
</body>
</html>
