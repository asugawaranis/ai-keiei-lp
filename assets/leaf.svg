<svg width="320" height="560" viewBox="0 0 320 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 葉の水彩グラデ -->
    <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B58A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A89968" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8C9A0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B5A878" stop-opacity="0.25"/>
    </linearGradient>
    <!-- ソフトにじみ -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <!-- メインの枝 -->
    <path d="M250 540 C220 460 180 380 150 300 C120 220 110 140 130 60"
          stroke="#A8946A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- 大きな葉（下から上へ、交互に配置） -->
    <!-- 葉1 -->
    <g opacity="0.9">
      <path d="M205 470 C150 460 95 425 70 370 C130 380 185 415 205 470Z" fill="url(#leafA)"/>
      <path d="M205 470 C150 460 95 425 70 370" stroke="#A8946A" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M180 445 C140 435 110 410 90 385" stroke="#A8946A" stroke-width="0.6" fill="none" opacity="0.4"/>
    </g>
    <!-- 葉2（右上向き） -->
    <g opacity="0.85">
      <path d="M188 420 C230 390 260 335 262 275 C215 305 185 360 188 420Z" fill="url(#leafB)"/>
      <path d="M188 420 C230 390 260 335 262 275" stroke="#A8946A" stroke-width="1" fill="none" opacity="0.55"/>
      <path d="M210 390 C238 365 252 330 256 300" stroke="#A8946A" stroke-width="0.6" fill="none" opacity="0.4"/>
    </g>
    <!-- 葉3 -->
    <g opacity="0.9">
      <path d="M170 360 C115 352 62 318 40 265 C100 273 152 305 170 360Z" fill="url(#leafA)"/>
      <path d="M170 360 C115 352 62 318 40 265" stroke="#A8946A" stroke-width="1" fill="none" opacity="0.55"/>
    </g>
    <!-- 葉4（右上） -->
    <g opacity="0.8">
      <path d="M158 312 C198 285 224 234 226 180 C183 207 156 257 158 312Z" fill="url(#leafB)"/>
      <path d="M158 312 C198 285 224 234 226 180" stroke="#A8946A" stroke-width="1" fill="none" opacity="0.5"/>
    </g>
    <!-- 葉5 -->
    <g opacity="0.85">
      <path d="M145 255 C95 248 48 217 30 170 C84 178 130 207 145 255Z" fill="url(#leafA)"/>
      <path d="M145 255 C95 248 48 217 30 170" stroke="#A8946A" stroke-width="0.9" fill="none" opacity="0.5"/>
    </g>
    <!-- 葉6（上・小） -->
    <g opacity="0.75">
      <path d="M138 200 C172 178 192 138 194 95 C160 118 138 158 138 200Z" fill="url(#leafB)"/>
      <path d="M138 200 C172 178 192 138 194 95" stroke="#A8946A" stroke-width="0.8" fill="none" opacity="0.45"/>
    </g>
    <!-- 葉7（てっぺん） -->
    <g opacity="0.7">
      <path d="M128 150 C88 145 52 122 36 88 C78 95 116 118 128 150Z" fill="url(#leafA)"/>
    </g>

    <!-- 小さな実・つぼみ -->
    <circle cx="118" cy="95" r="4" fill="#C9A86E" opacity="0.5"/>
    <circle cx="128" cy="78" r="3" fill="#C9A86E" opacity="0.4"/>
    <circle cx="138" cy="64" r="2.5" fill="#C9A86E" opacity="0.35"/>
  </g>
</svg>
